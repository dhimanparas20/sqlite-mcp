<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Hub - AI Agent Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#06090f;color:#e2e8f0}

        body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background:
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(99,102,241,.15) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(168,85,247,.1) 0%, transparent 50%),
                radial-gradient(ellipse 50% 30% at 50% 50%, rgba(56,189,248,.06) 0%, transparent 50%),
                linear-gradient(180deg, #06090f 0%, #0a0f18 100%);
            animation:bgPulse 12s ease-in-out infinite alternate}
        @keyframes bgPulse{0%{opacity:.85}100%{opacity:1}}

        .app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;max-width:1200px;margin:0 auto;padding:.75rem;gap:.65rem}

        .glass{background:rgba(12,16,28,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,.12);border-radius:18px}
        .glass-glow{box-shadow:0 0 40px rgba(99,102,241,.08),inset 0 1px 0 rgba(255,255,255,.03)}

        .hdr{padding:.7rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;animation:fadeDown .5s ease;position:relative}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
        .hdr::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.35),transparent)}

        .logo{display:flex;align-items:center;gap:.65rem}
        .logo-box{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;box-shadow:0 4px 20px rgba(99,102,241,.4);animation:logoGlow 3s ease-in-out infinite}
        @keyframes logoGlow{0%,100%{box-shadow:0 4px 20px rgba(99,102,241,.4)}50%{box-shadow:0 4px 30px rgba(168,85,247,.5)}}
        .logo-txt{font-weight:700;font-size:1.4rem;background:linear-gradient(135deg,#f1f5f9,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}

        .header-actions{display:flex;align-items:center;gap:.5rem}
        .status{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:#34d399;padding:.4rem .8rem;border-radius:20px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.15)}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#34d399;box-shadow:0 0 10px #34d399;animation:pulse 2s infinite}
        .status.off{color:#f87171;background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.15)}
        .status.off .status-dot{background:#f87171;box-shadow:0 0 10px #f87171}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.9)}}

        .btn-icon{background:rgba(30,35,55,.5);border:1px solid rgba(99,102,241,.15);color:#94a3b8;padding:.5rem .75rem;border-radius:12px;font-size:.85rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:.45rem;font-family:inherit}
        .btn-icon:hover{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.4);color:#e2e8f0;transform:translateY(-2px);box-shadow:0 4px 15px rgba(99,102,241,.15)}

        .tools-panel{position:absolute;top:100%;right:0;margin-top:.5rem;width:320px;max-height:400px;overflow-y:auto;background:rgba(12,16,28,.95);backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,.2);border-radius:16px;padding:1rem;display:none;z-index:100}
        .tools-panel.show{display:block;animation:slideDown .25s ease}
        @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        .tool-chip{display:inline-flex;align-items:center;gap:.35rem;padding:.35rem .7rem;margin:.25rem;border-radius:8px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.15);color:#a5b4fc;font-size:.75rem}
        .tool-chip i{font-size:.9rem}

        .main-content{flex:1;display:flex;min-height:0;overflow:hidden}

        

        .chat{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;animation:scaleUp .4s ease}
        @keyframes scaleUp{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

        .msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
        .msgs::-webkit-scrollbar{width:6px}
        .msgs::-webkit-scrollbar-track{background:transparent}
        .msgs::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:10px}
        .msgs::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.5)}
        .msgs{scrollbar-width:thin;scrollbar-color:rgba(99,102,241,.3) transparent}

        .msg{display:flex;gap:.75rem;max-width:90%;animation:msgIn .35s ease}
        .msg.user{align-self:flex-end;flex-direction:row-reverse}
        .msg.assistant{align-self:flex-start}
        @keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .avatar{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;color:#fff}
        .msg.assistant .avatar{background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);box-shadow:0 3px 12px rgba(99,102,241,.3)}
        .msg.user .avatar{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 3px 12px rgba(16,185,129,.3)}
        .bubble{padding:.85rem 1.15rem;border-radius:18px;font-size:.92rem;line-height:1.65;color:#e2e8f0;transition:transform .15s;max-width:100%}
        .bubble:hover{transform:translateY(-1px)}
        .msg.assistant .bubble{background:rgba(20,25,42,.85);border:1px solid rgba(99,102,241,.12);border-top-left-radius:4px}
        .msg.user .bubble{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(168,85,247,.1));border:1px solid rgba(99,102,241,.25);border-top-right-radius:4px}
        .bubble *{color:#e2e8f0}
        .bubble p{margin-bottom:.5rem}
        .bubble p:last-child{margin-bottom:0}
        .bubble pre{background:rgba(0,0,0,.6);border:1px solid rgba(99,102,241,.15);border-radius:12px;padding:.9rem;margin:.6rem 0;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.5}
        .bubble code{font-family:'JetBrains Mono',monospace;background:rgba(99,102,241,.12);padding:.15rem .4rem;border-radius:6px;font-size:.86em;color:#c7d2fe}
        .bubble pre code{background:none;padding:0;color:#e2e8f0}
        .bubble ul,.bubble ol{margin:.5rem 0;padding-left:1.5rem}
        .bubble li{margin:.3rem 0}
        .bubble strong{color:#c7d2fe;font-weight:600}
        .bubble a{color:#818cf8;text-decoration:underline;text-decoration-color:rgba(129,140,248,.4)}
        .bubble a:hover{color:#a5b4fc}

        .json-output{background:rgba(0,0,0,.6);border-radius:12px;padding:.85rem;margin:.5rem 0;font-family:'JetBrains Mono',monospace;font-size:.8rem;max-height:450px;overflow:auto;color:#e2e8f0;border:1px solid rgba(99,102,241,.15)}
        .json-key{color:#a5b4fc}.json-string{color:#34d399}.json-number{color:#f472b6}.json-boolean{color:#fb923c}.json-null{color:#64748b}

        .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2.5rem;animation:fadeIn .6s ease}
        @keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        .empty-ico{width:90px;height:90px;border-radius:28px;background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(168,85,247,.08));border:1px solid rgba(99,102,241,.2);display:flex;align-items:center;justify-content:center;font-size:2.6rem;margin-bottom:1.5rem;animation:bob 6s ease-in-out infinite}
        @keyframes bob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(2deg)}}
        .empty h3{font-size:1.45rem;font-weight:700;color:#f1f5f9;margin-bottom:.45rem;letter-spacing=-.02em}
        .empty p{color:#64748b;max-width:420px;font-size:.95rem;line-height:1.6}
        .suggestions{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.5rem;justify-content:center;max-width:500px}
        .suggestion{padding:.5rem 1rem;border-radius:20px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.18);color:#94a3b8;font-size:.82rem;cursor:pointer;transition:all .25s;font-family:inherit}
        .suggestion:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#e2e8f0;transform:translateY(-3px);box-shadow:0 6px 20px rgba(99,102,241,.2)}

        .input-wrapper{padding:.85rem 1rem 1rem;border-top:1px solid rgba(99,102,241,.08);flex-shrink:0;border-bottom-left-radius:18px;border-bottom-right-radius:18px}
        .input-row{display:flex;gap:.65rem;align-items:flex-end}
        .inp{flex:1;background:rgba(0,0,0,.35);border:1px solid rgba(99,102,241,.12);border-radius:16px;padding:.85rem 1.2rem;color:#e2e8f0;font-size:.92rem;font-family:inherit;resize:none;max-height:150px;min-height:52px;transition:all .25s;line-height:1.55}
        .inp:focus{outline:none;border-color:rgba(99,102,241,.5);box-shadow:0 0 0 4px rgba(99,102,241,.12)}
        .inp::placeholder{color:#475569}
        .btn-send{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);border:none;color:#fff;font-size:1.2rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 20px rgba(99,102,241,.3)}
        .btn-send:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 6px 25px rgba(99,102,241,.4)}
        .btn-send:active{transform:scale(.96)}
        .btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

        .typing{display:flex;gap:5px;padding:1rem 1.2rem;background:rgba(20,25,42,.85);border:1px solid rgba(99,102,241,.12);border-radius:18px;border-top-left-radius:6px;width:fit-content}
        .typing span{width:8px;height:8px;background:#6366f1;border-radius:50%;animation:dot 1.4s infinite ease-in-out}
        .typing span:nth-child(1){animation-delay:0s}
        .typing span:nth-child(2){animation-delay:.2s}
        .typing span:nth-child(3){animation-delay:.4s}
        @keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

        .toasts{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;max-width:350px}
        .toast{padding:.8rem 1.2rem;border-radius:14px;display:flex;align-items:center;gap:.65rem;font-size:.86rem;font-weight:500;backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,.15);color:#e2e8f0;background:rgba(12,16,28,.92);animation:toastIn .35s ease}
        .toast.success{border-left:4px solid #34d399}
        .toast.error{border-left:4px solid #f87171}
        .toast.info{border-left:4px solid #818cf8}
        .toast.success i{color:#34d399;font-size:1.1rem}
        .toast.error i{color:#f87171;font-size:1.1rem}
        .toast.info i{color:#818cf8;font-size:1.1rem}
        @keyframes toastIn{from{opacity:0;transform:translateX(25px)}to{opacity:1;transform:translateX(0)}}

        @media(max-width:768px){
            .main-content{flex-direction:column}
        }
        @media(max-width:768px){
            .app{padding:.5rem;gap:.5rem}
            .hdr{padding:.6rem .9rem;border-radius:14px}
            .logo-txt{font-size:1.15rem}
            .msg{max-width:95%}
            .msgs{padding:1rem}
            .input-wrapper{padding:.7rem}
            .chat{border-radius:14px}
            .header-actions .btn-icon span{display:none}
            .toasts{left:.5rem;right:.5rem;max-width:none}
        }
        @media(max-width:480px){
            .status span:not(.status-dot){display:none}
            .logo-txt{font-size:1rem}
            .logo-box{width:36px;height:36px;font-size:1rem}
            .btn-icon{padding:.45rem}
            .input-row{gap:.35rem}
            .btn-send{width:46px;height:46px;border-radius:14px}
            .inp{padding:.75rem 1rem;font-size:.88rem}
            .suggestion{font-size:.78rem;padding:.45rem .85rem}
        }
    </style>
</head>
<body>

<div class="app">
    <header class="hdr glass glass-glow">
        <div class="logo">
            <div class="logo-box"><i class="bi bi-robot"></i></div>
            <span class="logo-txt">MCP Hub</span>
        </div>
        <div class="header-actions">
            <div class="status" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">Online</span>
            </div>
            <button class="btn-icon" onclick="toggleToolsPanel()" title="Available Tools">
                <i class="bi bi-gear"></i>
                <span>Tools</span>
            </button>
            <button class="btn-icon" onclick="clearChat()" title="Clear Chat">
                <i class="bi bi-trash3"></i>
                <span>Clear</span>
            </button>
        </div>
    </header>

    <div class="tools-panel glass" id="toolsPanel">
        <div style="margin-bottom:.75rem;font-weight:600;color:#e2e8f0;font-size:.9rem">
            <i class="bi bi-grid-3x3-gap" style="margin-right:.5rem"></i>Available Tools
        </div>
        <div class="tool-chip"><i class="bi bi-database"></i>sqlite-local</div>
        <div class="tool-chip"><i class="bi bi-download"></i>downloader</div>
        <div class="tool-chip"><i class="bi bi-search"></i>ddg-search</div>
        <div class="tool-chip"><i class="bi bi-globe"></i>fetch</div>
        <div class="tool-chip"><i class="bi bi-clock"></i>time</div>
        <div class="tool-chip"><i class="bi bi-file-earmark-text"></i>pageindex</div>
        <div class="tool-chip"><i class="bi bi-envelope"></i>send_email</div>
        <div class="tool-chip"><i class="bi bi-clock-history"></i>schedule_task</div>
        <div class="tool-chip"><i class="bi bi-cloud-sun"></i>weather</div>
        <div class="tool-chip"><i class="bi bi-folder"></i>file_management</div>
    </div>

    <div class="main-content">
        <div class="chat glass">
            <div class="msgs" id="chatMessages">
                <div class="empty" id="emptyState">
                    <div class="empty-ico">🤖</div>
                    <h3>Welcome to MCP Hub</h3>
                    <p>Your AI agent platform with powerful tools. Ask me anything — search the web, manage databases, send emails, schedule tasks, and more!</p>
                    <div class="suggestions">
                        <button class="suggestion" onclick="useSuggestion('What tools are available?')">🔧 List Tools</button>
                        <button class="suggestion" onclick="useSuggestion('Search for latest AI news')">🔍 Web Search</button>
                        <button class="suggestion" onclick="useSuggestion('Create a simple table')">🗄️ Create Table</button>
                        <button class="suggestion" onclick="useSuggestion('Help me write code')">💻 Write Code</button>
                        <button class="suggestion" onclick="useSuggestion('Summarize any topic')">📝 Summarize</button>
                        <button class="suggestion" onclick="useSuggestion('Weather in Tokyo')">🌤️ Weather</button>
                    </div>
                </div>
            </div>

            <div class="input-wrapper">
                <div class="input-row">
                    <textarea class="inp" id="chatInput" placeholder="Type your message... (Enter to send, Shift+Enter for new line)" rows="1" onkeydown="handleKeyDown(event)"></textarea>
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Send Message">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toasts" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let isLoading = false;

    function toggleToolsPanel() {
        document.getElementById('toolsPanel').classList.toggle('show');
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('#toolsPanel') && !e.target.closest('[onclick="toggleToolsPanel()"]')) {
            document.getElementById('toolsPanel').classList.remove('show');
        }
    });

    function autoResize() {
        const ta = document.getElementById('chatInput');
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 150) + 'px';
    }
    document.getElementById('chatInput').addEventListener('input', autoResize);

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function useSuggestion(text) {
        document.getElementById('chatInput').value = text;
        autoResize();
        sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message || isLoading) return;

        input.value = '';
        autoResize();
        document.getElementById('emptyState').style.display = 'none';
        addMessage(message, 'user');
        showTyping();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            hideTyping();

            if (data.response) {
                addMessage(data.response, 'assistant');
            } else if (data.detail) {
                addMessage('Error: ' + data.detail, 'assistant');
                showToast('Failed to get response', 'error');
            }
        } catch (error) {
            hideTyping();
            addMessage('Connection error: ' + error.message, 'assistant');
            showToast('Failed to send message', 'error');
        }
    }

    function addMessage(content, role) {
        const container = document.getElementById('chatMessages');
        const icon = role === 'user' ? 'bi-person' : 'bi-robot';
        const formatted = formatContent(content);
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.innerHTML = '<div class="avatar"><i class="bi ' + icon + '"></i></div><div class="bubble">' + formatted + '</div>';
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function formatContent(content) {
        if (content.trim().startsWith('{') || content.trim().startsWith('[')) {
            try {
                const parsed = JSON.parse(content);
                return '<div class="json-output">' + syntaxHighlight(JSON.stringify(parsed, null, 2)) + '</div>';
            } catch (e) {}
        }
        content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
            return '<pre><code class="language-' + (lang || '') + '">' + escapeHtml(code.trim()) + '</code></pre>';
        });
        content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
        content = content.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        content = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
        content = content.replace(/\n/g, '<br>');
        return content;
    }

    function syntaxHighlight(json) {
        return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
            var cls = 'json-number';
            if (/^"/.test(match)) {
                cls = /:$/.test(match) ? 'json-key' : 'json-string';
            } else if (/true|false/.test(match)) {
                cls = 'json-boolean';
            } else if (/null/.test(match)) {
                cls = 'json-null';
            }
            return '<span class="' + cls + '">' + match + '</span>';
        });
    }

    function escapeHtml(text) {
        var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function showTyping() {
        isLoading = true;
        document.getElementById('sendBtn').disabled = true;
        var container = document.getElementById('chatMessages');
        var div = document.createElement('div');
        div.id = 'typingMessage';
        div.className = 'msg assistant';
        div.innerHTML = '<div class="avatar"><i class="bi bi-robot"></i></div><div class="typing"><span></span><span></span><span></span></div>';
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        var el = document.getElementById('typingMessage');
        if (el) el.remove();
    }

    async function clearChat() {
        try {
            await fetch('/api/clear', { method: 'POST' });
            showEmptyState();
            showToast('Chat cleared', 'success');
        } catch (error) {
            showToast('Failed to clear chat', 'error');
        }
    }

    function showEmptyState() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '<div class="empty" id="emptyState"><div class="empty-ico">🤖</div><h3>Welcome to MCP Hub</h3><p>Your AI agent platform with powerful tools. Ask me anything — search the web, manage databases, send emails, schedule tasks, and more!</p><div class="suggestions"><button class="suggestion" onclick="useSuggestion(\'What tools are available?\')">🔧 List Tools</button><button class="suggestion" onclick="useSuggestion(\'Search for latest AI news\')">🔍 Web Search</button><button class="suggestion" onclick="useSuggestion(\'Create a simple table\')">🗄️ Create Table</button><button class="suggestion" onclick="useSuggestion(\'Help me write code\')">💻 Write Code</button><button class="suggestion" onclick="useSuggestion(\'Summarize any topic\')">📝 Summarize</button><button class="suggestion" onclick="useSuggestion(\'Weather in Tokyo\')">🌤️ Weather</button></div></div>';
    }

    function showToast(message, type) {
        type = type || 'info';
        var container = document.getElementById('toastContainer');
        var t = document.createElement('div');
        t.className = 'toast ' + type;
        var icon = type === 'success' ? 'bi-check-circle-fill' : (type === 'error' ? 'bi-exclamation-circle-fill' : 'bi-info-circle-fill');
        t.innerHTML = '<i class="bi ' + icon + '"></i><span>' + message + '</span>';
        container.appendChild(t);
        setTimeout(function() { t.style.opacity = '0'; t.style.transform = 'translateX(25px)'; }, 2700);
        setTimeout(function() { t.remove(); }, 3000);
    }

    async function loadHistory() {
        try {
            var response = await fetch('/api/history');
            var data = await response.json();
            if (data.history && data.history.length > 0) {
                document.getElementById('emptyState').style.display = 'none';
                data.history.forEach(function(item) {
                    addMessage(item.question, 'user');
                    addMessage(item.answer, 'assistant');
                });
            }
        } catch (e) {
            console.error('Failed to load history:', e);
        }
    }
    loadHistory();

    async function checkHealth() {
        try {
            var response = await fetch('/ping');
            if (!response.ok) throw new Error('offline');
            document.getElementById('statusText').textContent = 'Online';
            document.getElementById('statusBadge').classList.remove('off');
        } catch (e) {
            document.getElementById('statusText').textContent = 'Offline';
            document.getElementById('statusBadge').classList.add('off');
            showToast('Server connection lost', 'error');
        }
    }
    checkHealth();
    setInterval(checkHealth, 30000);
</script>
</body>
</html>

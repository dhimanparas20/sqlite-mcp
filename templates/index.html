<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Hub - AI Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#0b0f19;color:#e2e8f0}

        body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background:radial-gradient(ellipse at 15% 15%,rgba(99,102,241,.12),transparent 55%),
                        radial-gradient(ellipse at 85% 80%,rgba(168,85,247,.08),transparent 55%),
                        radial-gradient(ellipse at 50% 50%,rgba(56,189,248,.05),transparent 60%);
            animation:bgShift 10s ease infinite alternate}
        @keyframes bgShift{0%{opacity:.8}100%{opacity:1}}

        .app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;max-width:960px;margin:0 auto;padding:.75rem;gap:.65rem}

        .glass{background:rgba(15,20,35,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(148,163,184,.1);border-radius:16px}

        .hdr{padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;animation:fadeDown .5s ease;position:relative}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
        .hdr::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.3),transparent)}
        .logo{display:flex;align-items:center;gap:.6rem}
        .logo-box{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:#fff;box-shadow:0 3px 18px rgba(99,102,241,.35)}
        .logo-txt{font-weight:700;font-size:1.35rem;background:linear-gradient(135deg,#e2e8f0,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .status{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:#34d399}
        .status-dot{width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 8px #34d399;animation:pulse 2s infinite}
        .status.off{color:#f87171}
        .status.off .status-dot{background:#f87171;box-shadow:0 0 8px #f87171}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .btn-g{background:rgba(15,20,35,.5);border:1px solid rgba(148,163,184,.1);color:#94a3b8;padding:.4rem .9rem;border-radius:10px;font-size:.82rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:.4rem;font-family:inherit}
        .btn-g:hover{border-color:rgba(99,102,241,.4);color:#e2e8f0;transform:translateY(-1px);box-shadow:0 3px 12px rgba(99,102,241,.12)}

        .chat{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;animation:scaleUp .4s ease}
        @keyframes scaleUp{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}

        .msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
        .msgs::-webkit-scrollbar{width:5px}
        .msgs::-webkit-scrollbar-track{background:transparent}
        .msgs::-webkit-scrollbar-thumb{background:rgba(99,102,241,.25);border-radius:8px}
        .msgs::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.45)}
        .msgs{scrollbar-width:thin;scrollbar-color:rgba(99,102,241,.25) transparent}

        .msg{display:flex;gap:.75rem;max-width:85%;animation:msgIn .35s ease}
        .msg.user{align-self:flex-end;flex-direction:row-reverse}
        .msg.assistant{align-self:flex-start}
        @keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .avatar{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;color:#fff}
        .msg.assistant .avatar{background:linear-gradient(135deg,#6366f1,#a855f7);box-shadow:0 2px 10px rgba(99,102,241,.25)}
        .msg.user .avatar{background:linear-gradient(135deg,#34d399,#059669);box-shadow:0 2px 10px rgba(52,211,153,.25)}
        .bubble{padding:.85rem 1.15rem;border-radius:16px;font-size:.9rem;line-height:1.65;color:#e2e8f0;transition:transform .15s}
        .bubble:hover{transform:translateY(-1px)}
        .msg.assistant .bubble{background:rgba(15,20,35,.65);border:1px solid rgba(148,163,184,.08);border-top-left-radius:4px}
        .msg.user .bubble{background:linear-gradient(135deg,rgba(99,102,241,.13),rgba(168,85,247,.08));border:1px solid rgba(99,102,241,.22);border-top-right-radius:4px}
        .bubble *{color:#e2e8f0}
        .bubble p{margin-bottom:.4rem}
        .bubble p:last-child{margin-bottom:0}
        .bubble pre{background:rgba(0,0,0,.45);border:1px solid rgba(148,163,184,.08);border-radius:10px;padding:.85rem;margin:.6rem 0;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:.8rem}
        .bubble code{font-family:'JetBrains Mono',monospace;background:rgba(99,102,241,.1);padding:.1rem .35rem;border-radius:4px;font-size:.84em;color:#a5b4fc}
        .bubble pre code{background:none;padding:0;color:#e2e8f0}
        .bubble ul,.bubble ol{margin:.4rem 0;padding-left:1.4rem}
        .bubble li{margin:.2rem 0}
        .bubble strong{color:#c7d2fe;font-weight:600}

        .json-output{background:rgba(0,0,0,.5);border-radius:8px;padding:.75rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;max-height:400px;overflow:auto;color:#e2e8f0}
        .json-key{color:#818cf8}.json-string{color:#a5b4fc}.json-number{color:#34d399}.json-boolean{color:#f472b6}.json-null{color:#64748b}

        .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;animation:fadeIn .6s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .empty-ico{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(168,85,247,.07));border:1px solid rgba(99,102,241,.13);display:flex;align-items:center;justify-content:center;font-size:2.4rem;margin-bottom:1.2rem;animation:bob 5s ease-in-out infinite}
        @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .empty h3{font-size:1.3rem;font-weight:700;color:#e2e8f0;margin-bottom:.35rem}
        .empty p{color:#64748b;max-width:380px;font-size:.9rem;line-height:1.5}
        .chips{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:1.2rem;justify-content:center}
        .chip{padding:.38rem .85rem;border-radius:18px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.14);color:#94a3b8;font-size:.78rem;cursor:pointer;transition:all .25s;font-family:inherit}
        .chip:hover{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.32);color:#c7d2fe;transform:translateY(-2px)}

        .inp-area{padding:.85rem 1rem 1rem;border-top:1px solid rgba(148,163,184,.06);flex-shrink:0}
        .inp-row{display:flex;gap:.6rem;align-items:flex-end}
        .inp{flex:1;background:rgba(0,0,0,.28);border:1px solid rgba(148,163,184,.08);border-radius:14px;padding:.8rem 1.1rem;color:#e2e8f0;font-size:.9rem;font-family:inherit;resize:none;max-height:140px;min-height:48px;transition:all .25s;line-height:1.5}
        .inp:focus{outline:none;border-color:rgba(99,102,241,.45);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .inp::placeholder{color:#475569}
        .btn-send{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;color:#fff;font-size:1.15rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .btn-send:hover{transform:scale(1.06) translateY(-1px);box-shadow:0 4px 18px rgba(99,102,241,.35)}
        .btn-send:active{transform:scale(.95)}
        .btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

        .typing{display:flex;gap:5px;padding:.85rem 1.1rem;background:rgba(15,20,35,.65);border:1px solid rgba(148,163,184,.08);border-radius:16px;border-top-left-radius:4px;width:fit-content}
        .typing span{width:7px;height:7px;background:#6366f1;border-radius:50%;animation:dot 1.4s infinite ease-in-out}
        .typing span:nth-child(1){animation-delay:0s}
        .typing span:nth-child(2){animation-delay:.2s}
        .typing span:nth-child(3){animation-delay:.4s}
        @keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

        .toasts{position:fixed;bottom:1.2rem;right:1.2rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem}
        .toast-item{padding:.7rem 1.1rem;border-radius:12px;display:flex;align-items:center;gap:.6rem;font-size:.84rem;font-weight:500;backdrop-filter:blur(16px);border:1px solid rgba(148,163,184,.1);color:#e2e8f0;background:rgba(15,20,35,.85);animation:toastIn .3s ease}
        .toast-item.success{border-left:3px solid #34d399}
        .toast-item.error{border-left:3px solid #f87171}
        .toast-item.success i{color:#34d399}
        .toast-item.error i{color:#f87171}
        @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

        @media(max-width:768px){
            .app{padding:.5rem;gap:.5rem}
            .hdr{padding:.6rem .9rem;border-radius:12px}
            .logo-txt{font-size:1.1rem}
            .msg{max-width:95%}
            .msgs{padding:.85rem}
            .inp-area{padding:.65rem}
            .chat{border-radius:14px}
        }
        @media(max-width:480px){
            .status span:not(.status-dot){display:none}
            .btn-g span{display:none}
            .inp-row{gap:.4rem}
            .btn-send{width:44px;height:44px;border-radius:12px}
            .inp{padding:.7rem .9rem;font-size:.86rem}
        }
    </style>
</head>
<body>

<div class="app">
    <header class="hdr glass">
        <div class="logo">
            <div class="logo-box"><i class="bi bi-robot"></i></div>
            <span class="logo-txt">MCP Hub</span>
        </div>
        <div class="status" id="statusBadge">
            <span class="status-dot"></span>
            <span id="statusText">Online</span>
        </div>
        <div>
            <button class="btn-g" onclick="clearChat()">
                <i class="bi bi-trash3"></i>
                <span>Clear</span>
            </button>
        </div>
    </header>

    <div class="chat glass">
        <div class="msgs" id="chatMessages">
            <div class="empty" id="emptyState">
                <div class="empty-ico">💬</div>
                <h3>Start a conversation</h3>
                <p>Ask me anything using the MCP tools — search the web, query databases, manage files, and more!</p>
                <div class="chips">
                    <button class="chip" onclick="useSuggestion('What tools are available?')">🔧 Available tools</button>
                    <button class="chip" onclick="useSuggestion('Search the web for latest AI news')">🔍 Search the web</button>
                    <button class="chip" onclick="useSuggestion('Help me write a Python script')">🐍 Python help</button>
                    <button class="chip" onclick="useSuggestion('Summarize a topic for me')">📝 Summarize</button>
                </div>
            </div>
        </div>

        <div class="inp-area">
            <div class="inp-row">
                <textarea class="inp" id="chatInput" placeholder="Type your message... (Enter to send, Shift+Enter for new line)" rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div class="toasts" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let isLoading = false;

    function autoResize() {
        const ta = document.getElementById('chatInput');
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
    }
    document.getElementById('chatInput').addEventListener('input', autoResize);

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function useSuggestion(text) {
        document.getElementById('chatInput').value = text;
        autoResize();
        sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message || isLoading) return;

        input.value = '';
        autoResize();
        document.getElementById('emptyState').style.display = 'none';
        addMessage(message, 'user');
        showLoading();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            hideLoading();

            if (data.response) {
                addMessage(data.response, 'assistant');
            } else if (data.error) {
                addMessage('Error: ' + data.error, 'assistant');
                showToast('Failed to get response', 'error');
            }
        } catch (error) {
            hideLoading();
            addMessage('Connection error: ' + error.message, 'assistant');
            showToast('Failed to send message', 'error');
        }
    }

    function addMessage(content, role) {
        const container = document.getElementById('chatMessages');
        const icon = role === 'user' ? 'bi-person' : 'bi-robot';
        const formatted = formatContent(content);
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.innerHTML = '<div class="avatar"><i class="bi ' + icon + '"></i></div><div class="bubble">' + formatted + '</div>';
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function formatContent(content) {
        if (content.trim().startsWith('{') || content.trim().startsWith('[')) {
            try {
                const parsed = JSON.parse(content);
                return '<div class="json-output">' + syntaxHighlight(JSON.stringify(parsed, null, 2)) + '</div>';
            } catch (e) {}
        }
        content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
            return '<pre><code class="language-' + (lang || '') + '">' + escapeHtml(code.trim()) + '</code></pre>';
        });
        content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
        content = content.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        content = content.replace(/\n/g, '<br>');
        return content;
    }

    function syntaxHighlight(json) {
        return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
            var cls = 'json-number';
            if (/^"/.test(match)) {
                cls = /:$/.test(match) ? 'json-key' : 'json-string';
            } else if (/true|false/.test(match)) {
                cls = 'json-boolean';
            } else if (/null/.test(match)) {
                cls = 'json-null';
            }
            return '<span class="' + cls + '">' + match + '</span>';
        });
    }

    function escapeHtml(text) {
        var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function showLoading() {
        isLoading = true;
        document.getElementById('sendBtn').disabled = true;
        var container = document.getElementById('chatMessages');
        var div = document.createElement('div');
        div.id = 'loadingMessage';
        div.className = 'msg assistant';
        div.innerHTML = '<div class="avatar"><i class="bi bi-robot"></i></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function hideLoading() {
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        var el = document.getElementById('loadingMessage');
        if (el) el.remove();
    }

    async function clearChat() {
        try {
            await fetch('/api/clear', { method: 'POST' });
            document.getElementById('chatMessages').innerHTML = '<div class="empty" id="emptyState"><div class="empty-ico">💬</div><h3>Start a conversation</h3><p>Ask me anything using the MCP tools — search the web, query databases, manage files, and more!</p><div class="chips"><button class="chip" onclick="useSuggestion(\'What tools are available?\')">🔧 Available tools</button><button class="chip" onclick="useSuggestion(\'Search the web for latest AI news\')">🔍 Search the web</button><button class="chip" onclick="useSuggestion(\'Help me write a Python script\')">🐍 Python help</button><button class="chip" onclick="useSuggestion(\'Summarize a topic for me\')">📝 Summarize</button></div></div>';
            showToast('Chat cleared', 'success');
        } catch (error) {
            showToast('Failed to clear chat', 'error');
        }
    }

    function showToast(message, type) {
        type = type || 'success';
        var container = document.getElementById('toastContainer');
        var t = document.createElement('div');
        t.className = 'toast-item ' + type;
        t.innerHTML = '<i class="bi ' + (type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-circle-fill') + '"></i><span>' + message + '</span>';
        container.appendChild(t);
        setTimeout(function() { t.remove(); }, 3000);
    }

    async function loadChatHistory() {
        try {
            var response = await fetch('/api/history');
            var data = await response.json();
            if (data.history && data.history.length > 0) {
                document.getElementById('emptyState').style.display = 'none';
                data.history.forEach(function(item) {
                    addMessage(item.question, 'user');
                    addMessage(item.answer, 'assistant');
                });
                var container = document.getElementById('chatMessages');
                container.scrollTop = container.scrollHeight;
            }
        } catch (e) {
            console.error('Failed to load history:', e);
        }
    }
    loadChatHistory();

    async function checkHealth() {
        try {
            var response = await fetch('/ping');
            if (!response.ok) throw new Error('offline');
            document.getElementById('statusText').textContent = 'Online';
            document.getElementById('statusBadge').classList.remove('off');
        } catch (e) {
            document.getElementById('statusText').textContent = 'Offline';
            document.getElementById('statusBadge').classList.add('off');
            showToast('Server connection lost', 'error');
        }
    }
    checkHealth();
</script>
</body>
</html>

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  image: mcp-hub:local
  env_file:
    - .env
  restart: unless-stopped
  working_dir: /app
  init: true
  environment:
    PYTHONPATH: /app
  networks:
    - caddy
  volumes:
    - ./modules:/app/modules
    - ./datastore:/app/datastore
    - ./mcps:/app/mcps

networks:
  caddy:
    driver: bridge

services:
  mcp1:
    <<: *common
    command: ["uv", "run", "--frozen", "--no-sync", "python", "-m", "mcps.mcp_server"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mcp2:
    <<: *common
    command: ["uv", "run", "--frozen", "--no-sync", "python", "-m", "mcps.mcp_server2"]
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8005/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

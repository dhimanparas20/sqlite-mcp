x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  image: mcp-hub
  env_file:
    - .env
  restart: unless-stopped
  working_dir: /app
  init: true
  environment:
    PYTHONPATH: /app
  networks:
    - caddy
  volumes:
    - ./modules:/app/modules
    - ./datastore:/app/datastore
    - ./mcps:/app/mcps

networks:
  caddy:
    driver: bridge

services:
  mcp_sql:
    <<: *common
    container_name: mcp_sql
    command: ["uv", "run", "--frozen", "--no-sync", "python", "-m", "mcps.mcp_server"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mcp_fs:
    <<: *common
    container_name: mcp_fs
    command: ["uv", "run", "--frozen", "--no-sync", "python", "-m", "mcps.mcp_server2"]
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8005/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mcp_downloader:
    <<: *common
    container_name: mcp_downloader
    command: ["uv", "run", "--frozen", "--no-sync", "python", "-m", "mcps.mcp_server3"]
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8010/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  huey:
    <<: *common
    container_name: huey
    entrypoint: ["./huey_start.sh"]
    volumes:
      - ./modules:/app/modules
      - ./datastore:/app/datastore
      - ./tasks:/app/tasks
      - ./huey_start.sh:/app/huey_start.sh
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s

  app:
    <<: *common
    container_name: app
    command: [ "uv", "run", "--frozen", "--no-sync", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8001", "--reload", "--proxy-headers", "--workers", "1", "--use-colors", "--log-level", "debug" ]
    ports:
      - "8001:8001"
    volumes:
      - ./modules:/app/modules
      - ./datastore:/app/datastore
      - ./templates:/app/templates
      - ./tasks:/app/tasks
      - ./app.py:/app/app.py
    depends_on:
      mcp_fs:
        condition: service_started
      mcp_sql:
        condition: service_started
      mcp_downloader:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "test ! -f /tmp/drain && curl -f http://localhost:8001/ping" ]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 2s
